name: KfW Zinsen – Täglicher Scraper

on:
  schedule:
    # Jeden Werktag um 08:15 Uhr MEZ (= 07:15 UTC)
    - cron: '15 7 * * 1-5'
  workflow_dispatch:  # Auch manuell auslösbar über GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Damit der Job die CSV committen darf

    steps:
      - name: 📥 Repository auschecken
        uses: actions/checkout@v4

      - name: 🐍 Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Abhängigkeiten installieren
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: 🏗 KfW Zinsen scrapen
        run: python scraper/kfw_scraper.py

      - name: 💾 Neue Daten committen (falls vorhanden)
        run: |
          git config --global user.name  "KfW-Scraper-Bot"
          git config --global user.email "bot@github-actions"
          git add data/kfw_rates.csv
          # Nur committen wenn sich etwas geändert hat
          git diff --staged --quiet || git commit -m "📊 KfW Zinsen Update $(date '+%Y-%m-%d')"
          git push
