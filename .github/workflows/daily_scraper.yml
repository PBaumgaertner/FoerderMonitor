name: KfW Zinsen – Täglicher Scraper

on:
  schedule:
    - cron: '15 7 * * 1-5'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: 📥 Repository auschecken
        uses: actions/checkout@v4

      - name: 🐍 Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Abhängigkeiten installieren
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: 🏗 KfW Zinsen scrapen
        run: python scraper/kfw_scraper.py

      - name: 💾 Neue Daten committen
        run: |
          git config --global user.name  "KfW-Scraper-Bot"
          git config --global user.email "bot@github-actions"
          git add data/kfw_rates.csv data/kfw_programme.json
          git diff --staged --quiet || git commit -m "📊 KfW Update $(date '+%Y-%m-%d')"
          git push
