name: Daily KfW Scraper

on:
  schedule:
    # 07:15 UTC = 08:15 MEZ / 09:15 MESZ – Werktags
    # Zweiter Slot als Fallback falls GitHub den ersten überspringt
    - cron: '15 7 * * 1-5'
    - cron: '45 8 * * 1-5'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run Scraper
        run: python scraper/kfw_scraper.py

      - name: Inject data into dashboard
        run: python scraper/inject_dashboard.py

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/kfw_rates.csv data/kfw_programme.json docs/index.html
          git diff --cached --quiet || git commit -m "data: $(date +'%Y-%m-%d') KfW Zinsupdate"
          git push
