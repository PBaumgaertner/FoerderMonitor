<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KfW Fördermonitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#21262d;--accent:#58a6ff;--accent2:#3fb950;--accent3:#f78166;--accent4:#d2a8ff;--text:#e6edf3;--muted:#8b949e;--mono:'DM Mono',monospace;--serif:'Playfair Display',serif;--sans:'DM Sans',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}
header{border-bottom:1px solid var(--border);padding:28px 40px 24px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px}
.header-left h1{font-family:var(--serif);font-size:26px;font-weight:600;letter-spacing:-.3px}
.header-left p{color:var(--muted);font-size:13px;margin-top:2px}
.last-update{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:6px 12px;border-radius:6px;white-space:nowrap}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent2);margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
main{padding:32px 40px;max-width:1400px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}header{flex-direction:column;align-items:flex-start}main{padding:20px}}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 22px;transition:border-color .2s}
.kpi:hover{border-color:#30363d}
.kpi-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.kpi-value{font-family:var(--mono);font-size:28px;font-weight:500;line-height:1;color:var(--accent)}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:6px}
.kpi-delta{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:11px;padding:2px 7px;border-radius:4px;margin-top:8px}
.delta-up{background:rgba(247,129,102,.15);color:var(--accent3)}
.delta-down{background:rgba(63,185,80,.15);color:var(--accent2)}
.delta-flat{background:rgba(139,148,158,.12);color:var(--muted)}
.section-title{font-family:var(--serif);font-size:18px;font-weight:400;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.section-title span{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px}
.card-title{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:16px}
.rate-table{width:100%;border-collapse:collapse}
.rate-table th{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);text-align:left;padding:0 10px 10px 0;border-bottom:1px solid var(--border);font-weight:400}
.rate-table td{padding:9px 10px 9px 0;border-bottom:1px solid rgba(33,38,45,.6);font-size:13px;vertical-align:middle}
.rate-table tr:last-child td{border-bottom:none}
.rate-table tr:hover td{background:rgba(88,166,255,.04)}
.tag{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}
.tag-eh55{background:rgba(210,168,255,.15);color:var(--accent4)}
.tag-kfw40{background:rgba(88,166,255,.15);color:var(--accent)}
.tag-qng{background:rgba(63,185,80,.15);color:var(--accent2)}
.tag-unk{background:rgba(139,148,158,.1);color:var(--muted)}
.tag-type{background:rgba(139,148,158,.1);color:var(--muted)}
.rate-val{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--accent)}
.bar-row{margin-bottom:14px}
.bar-label{display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px}
.bar-label span:last-child{font-family:var(--mono);color:var(--accent)}
.bar-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.chart-wrap{position:relative;height:240px}
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.5px}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.inline-delta{font-family:var(--mono);font-size:10px;padding:1px 5px;border-radius:3px;margin-left:6px}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <h1>KfW Fördermonitor</h1>
    <p>Tagesaktuelle Zinskonditionen · Neubau Deutschland</p>
  </div>
  <div class="last-update" id="lastUpdate"><span class="dot"></span>Lade…</div>
</header>
<main>
  <div class="kpi-row" id="kpiRow"></div>
  <div class="grid-2">
    <div>
      <div class="section-title">Zinsentwicklung <span>Historisch</span></div>
      <div class="card">
        <div class="card-title">Effektivzins über Zeit · 10J · Annuität</div>
        <div class="filter-row" id="chartFilters"></div>
        <div class="chart-wrap"><canvas id="timeChart"></canvas></div>
      </div>
    </div>
    <div>
      <div class="section-title">Programm-Vergleich <span>Aktuell</span></div>
      <div class="card">
        <div class="card-title">Effektivzins je Förderstufe · 10J · Annuität</div>
        <div id="comparisonBars"></div>
      </div>
    </div>
  </div>
  <div class="section-title">Aktuelle Konditionen <span>Heute</span></div>
  <div class="card" style="margin-bottom:32px">
    <div class="filter-row" id="tableFilters"></div>
    <div id="rateTableWrap"></div>
  </div>
  <div class="section-title">Änderungen <span>Delta zum Vortag</span></div>
  <div class="card" style="margin-bottom:48px">
    <div id="deltaWrap"></div>
  </div>
</main>

// ── Daten direkt aus eingebetteten SEED_DATA (täglich per GitHub Actions aktualisiert) ──
async function loadData() {
  return { data: SEED_DATA, isLive: true };
}

function parseCSV(text) {
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n')
                    .replace(/^\uFEFF/,'').trim().split('\n').filter(l=>l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  if (!headers.includes('foerderstufe')) return [];
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h,i) => obj[h] = (vals[i]||'').trim().replace(/^"|"$/g,''));
    return obj;
  }).filter(r => r.date && /^\d{4}-\d{2}-\d{2}$/.test(r.date));
}

function tagClass(s){
  if(s==='EH55') return 'tag-eh55';
  if(s==='KFW40+QNG') return 'tag-qng';
  if(s==='Unbekannt') return 'tag-unk';
  return 'tag-kfw40';
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  const { data, isLive } = await loadData();

  const dates  = [...new Set(data.map(r=>r.date))].sort();
  const latest = dates[dates.length-1];
  const prev   = dates[dates.length-2]||null;
  const today  = data.filter(r=>r.date===latest);
  const yest   = prev ? data.filter(r=>r.date===prev) : [];

  document.getElementById('lastUpdate').innerHTML = 
    `<span class="dot"></span>Stand: <strong>${latest}</strong>`;

  renderKPIs(today, yest);
  renderComparison(today);
  renderTable(today, yest);
  renderDelta(today, yest, latest, prev);
  renderChart(data, dates);
}

// ── KPIs ──────────────────────────────────────────────────────────────────────
function renderKPIs(today, yest) {
  const pids = [...new Set(today.map(r=>r.programme_id))];
  const cards = [];
  const vals = today.map(r=>parseFloat(r.effektivzins_pct)).filter(v=>!isNaN(v)&&v>0);
  if (vals.length) {
    const minV = Math.min(...vals);
    const minR = today.find(r=>parseFloat(r.effektivzins_pct)===minV);
    cards.push({label:'Niedrigster Effektivzins',value:minV.toFixed(2)+' %',
      sub:minR?`${minR.programme_id} · ${minR.foerderstufe}`:'',delta:calcDelta(minV,yest,minR)});
  }
  for (const pid of pids.slice(0,3)) {
    const rows = today.filter(r=>r.programme_id===pid&&r.darlehensart==='Annuitätendarlehen'&&r.laufzeit_label.includes('10'));
    const rates = rows.map(r=>parseFloat(r.effektivzins_pct)).filter(v=>!isNaN(v)&&v>0);
    if (!rates.length) continue;
    const best = Math.min(...rates);
    const bestR = rows.find(r=>parseFloat(r.effektivzins_pct)===best);
    cards.push({label:`KfW ${pid}`,value:best.toFixed(2)+' %',
      sub:`${bestR?.foerderstufe||''} · 10J · Annuität`,delta:calcDelta(best,yest,bestR)});
  }
  document.getElementById('kpiRow').innerHTML = cards.map(c=>`
    <div class="kpi">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value">${c.value}</div>
      <div class="kpi-sub">${c.sub}</div>
      ${c.delta}
    </div>`).join('');
}

function calcDelta(cur,yest,ref) {
  if (!yest.length||!ref) return '';
  const p = yest.find(r=>r.programme_id===ref.programme_id&&r.foerderstufe===ref.foerderstufe&&r.darlehensart===ref.darlehensart&&r.laufzeit_label===ref.laufzeit_label);
  if (!p) return '';
  const diff = cur-parseFloat(p.effektivzins_pct);
  if (isNaN(diff)||Math.abs(diff)<0.001) return `<span class="kpi-delta delta-flat">= unverändert</span>`;
  return diff>0?`<span class="kpi-delta delta-up">▲ +${diff.toFixed(2)} %</span>`:`<span class="kpi-delta delta-down">▼ ${diff.toFixed(2)} %</span>`;
}

// ── Vergleich ─────────────────────────────────────────────────────────────────
window._compToday=[];
function renderComparison(today) {
  window._compToday=today;
  const arten=[...new Set(today.map(r=>r.darlehensart))].filter(Boolean);
  document.getElementById('comparisonBars').innerHTML=
    `<div class="filter-row" id="compFilters" style="margin-bottom:14px">${
      arten.map((a,i)=>`<button class="filter-btn ${i===0?'active':''}" onclick="filterComp('${a}',this)">${a.includes('Annuit')?'Annuität':'Endfällig'}</button>`).join('')
    }</div><div id="compBarsInner"></div>`;
  buildComp(today,arten[0]||'Annuitätendarlehen');
}
function filterComp(art,btn){
  document.querySelectorAll('#compFilters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildComp(window._compToday,art);
}
function buildComp(today,darlehen){
  const rows=today.filter(r=>r.darlehensart===darlehen&&r.laufzeit_label.includes('10')&&parseFloat(r.effektivzins_pct)>0);
  if(!rows.length){document.getElementById('compBarsInner').innerHTML='<div class="empty">Keine Daten</div>';return;}
  const max=Math.max(...rows.map(r=>parseFloat(r.effektivzins_pct)));
  document.getElementById('compBarsInner').innerHTML=rows.map(r=>{
    const v=parseFloat(r.effektivzins_pct);
    const col=STUFE_COL[r.foerderstufe]||'#8b949e';
    return `<div class="bar-row">
      <div class="bar-label"><span><span class="tag ${tagClass(r.foerderstufe)}">${r.foerderstufe}</span> ${r.programme_id}</span><span>${v.toFixed(2)} %</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(v/(max*1.15)*100).toFixed(1)}%;background:${col}"></div></div>
    </div>`;
  }).join('');
}

// ── Tabelle ───────────────────────────────────────────────────────────────────
window._tToday=[];window._tYest=[];
function renderTable(today,yest){
  window._tToday=today;window._tYest=yest;
  const pids=['Alle',...new Set(today.map(r=>r.programme_id))];
  document.getElementById('tableFilters').innerHTML=pids.map(p=>
    `<button class="filter-btn ${p==='Alle'?'active':''}" onclick="filterTable('${p}',this)">${p}</button>`).join('');
  buildTable(today,yest,'Alle');
}
function filterTable(prog,btn){
  document.querySelectorAll('#tableFilters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildTable(window._tToday,window._tYest,prog);
}
function buildTable(today,yest,prog){
  const rows=prog==='Alle'?today:today.filter(r=>r.programme_id===prog);
  if(!rows.length){document.getElementById('rateTableWrap').innerHTML='<div class="empty">Keine Daten</div>';return;}
  const trs=rows.map(r=>{
    const eff=parseFloat(r.effektivzins_pct);
    const p=yest.find(y=>y.programme_id===r.programme_id&&y.foerderstufe===r.foerderstufe&&y.darlehensart===r.darlehensart&&y.laufzeit_label===r.laufzeit_label);
    let delta='';
    if(p){const diff=eff-parseFloat(p.effektivzins_pct);if(Math.abs(diff)>0.001)delta=diff>0?`<span class="inline-delta" style="background:rgba(247,129,102,.15);color:var(--accent3)">▲ +${diff.toFixed(2)}</span>`:`<span class="inline-delta" style="background:rgba(63,185,80,.15);color:var(--accent2)">▼ ${diff.toFixed(2)}</span>`;}
    return `<tr>
      <td><strong style="font-size:12px">${r.programme_id}</strong></td>
      <td><span class="tag ${tagClass(r.foerderstufe)}">${r.foerderstufe}</span></td>
      <td><span class="tag tag-type" style="font-size:9px">${r.darlehensart.includes('Annuit')?'Annuität':'Endfällig'}</span></td>
      <td style="color:var(--muted);font-size:12px">${r.laufzeit_label}</td>
      <td style="font-family:var(--mono);color:var(--muted)">${r.zinsbindung_jahre||'–'} ${r.zinsbindung_jahre?'J.':''}</td>
      <td style="font-family:var(--mono);color:var(--muted)">${r.sollzins_pct||'–'} %</td>
      <td><span class="rate-val">${r.effektivzins_pct||'–'} %</span>${delta}</td>
    </tr>`;
  }).join('');
  document.getElementById('rateTableWrap').innerHTML=`
    <table class="rate-table">
      <thead><tr><th>Programm</th><th>Förderstufe</th><th>Darlehen</th><th>Laufzeit</th><th>Zinsbindung</th><th>Sollzins</th><th>Effektivzins</th></tr></thead>
      <tbody>${trs}</tbody>
    </table>`;
}

// ── Delta ─────────────────────────────────────────────────────────────────────
function renderDelta(today,yest,latestDate,prevDate){
  if(!yest.length){document.getElementById('deltaWrap').innerHTML='<div class="empty">Noch keine Vergleichsdaten (mind. 2 Tage nötig)</div>';return;}
  const changes=today.map(r=>{
    const p=yest.find(y=>y.programme_id===r.programme_id&&y.foerderstufe===r.foerderstufe&&y.darlehensart===r.darlehensart&&y.laufzeit_label===r.laufzeit_label);
    if(!p) return null;
    const diff=parseFloat(r.effektivzins_pct)-parseFloat(p.effektivzins_pct);
    return Math.abs(diff)>0.001?{...r,diff}:null;
  }).filter(Boolean);
  if(!changes.length){document.getElementById('deltaWrap').innerHTML=`<div class="empty" style="color:var(--accent2)">✓ Keine Änderungen seit ${prevDate}</div>`;return;}
  document.getElementById('deltaWrap').innerHTML=`
    <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:12px">${prevDate} → ${latestDate} · ${changes.length} Änderung(en)</div>
    <table class="rate-table"><thead><tr><th>Programm</th><th>Förderstufe</th><th>Laufzeit</th><th>Neuer Zins</th><th>Änderung</th></tr></thead>
    <tbody>${changes.map(c=>`<tr>
      <td><strong>${c.programme_id}</strong></td>
      <td><span class="tag ${tagClass(c.foerderstufe)}">${c.foerderstufe}</span></td>
      <td style="color:var(--muted);font-size:12px">${c.laufzeit_label}</td>
      <td style="font-family:var(--mono);color:var(--muted)">${parseFloat(c.effektivzins_pct).toFixed(2)} %</td>
      <td style="font-family:var(--mono);font-size:13px;color:${c.diff>0?'var(--accent3)':'var(--accent2)'}">${c.diff>0?'▲ +':'▼ '}${c.diff.toFixed(2)} %</td>
    </tr>`).join('')}</tbody></table>`;
}

// ── Chart ─────────────────────────────────────────────────────────────────────
let _chart=null;
window._cd=null;window._cDates=null;
function renderChart(data,dates){
  window._cd=data;window._cDates=dates;
  const stufen=[...new Set(data.map(r=>r.foerderstufe))];
  document.getElementById('chartFilters').innerHTML=stufen.map((s,i)=>
    `<button class="filter-btn ${i===0?'active':''}" onclick="filterChart('${s}',this)">${s}</button>`).join('');
  buildChart(stufen[0]||'KFW40');
}
function filterChart(stufe,btn){
  document.querySelectorAll('#chartFilters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildChart(stufe);
}
function buildChart(stufe){
  const data=window._cd,dates=window._cDates;
  const pids=[...new Set(data.map(r=>r.programme_id))];
  const datasets=pids.map((pid,i)=>{
    const pts=dates.map(d=>{
      const rs=data.filter(r=>r.date===d&&r.programme_id===pid&&r.foerderstufe===stufe&&r.darlehensart==='Annuitätendarlehen'&&r.laufzeit_label.includes('10'));
      const vs=rs.map(r=>parseFloat(r.effektivzins_pct)).filter(v=>!isNaN(v)&&v>0);
      return vs.length?Math.min(...vs):null;
    });
    return pts.some(p=>p!==null)?{label:`KfW ${pid}`,data:pts,borderColor:PROG_COL[i%PROG_COL.length],backgroundColor:PROG_COL[i%PROG_COL.length]+'18',borderWidth:2,pointRadius:3,pointHoverRadius:5,tension:.3,fill:false,spanGaps:true}:null;
  }).filter(Boolean);
  const ctx=document.getElementById('timeChart').getContext('2d');
  if(_chart)_chart.destroy();
  _chart=new Chart(ctx,{type:'line',data:{labels:dates,datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{labels:{color:'#8b949e',font:{family:'DM Mono',size:11},boxWidth:12,padding:16}},
    tooltip:{backgroundColor:'#1c2128',borderColor:'#30363d',borderWidth:1,titleColor:'#8b949e',bodyColor:'#e6edf3',bodyFont:{family:'DM Mono',size:12},callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y?.toFixed(2)} %`}}},
    scales:{x:{ticks:{color:'#8b949e',font:{family:'DM Mono',size:10},maxTicksLimit:8},grid:{color:'#21262d'}},
    y:{ticks:{color:'#8b949e',font:{family:'DM Mono',size:10},callback:v=>v.toFixed(2)+' %'},grid:{color:'#21262d'}}}}});
}

init();
</script>
</body>
</html>
